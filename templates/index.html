<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HMS — Test</title>
  <style>
    body { font-family: sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; margin:0; background:#f0f4ff; }
    button { padding:12px 28px; background:#3b82f6; color:#fff; border:none; border-radius:8px; font-size:16px; cursor:pointer; }
    button:hover { background:#2563eb; }
    pre { margin-top:20px; background:#1e293b; color:#94a3b8; padding:16px; border-radius:8px; max-width:600px; overflow:auto; }
  </style>
</head>
<body>
  <h1>🏥 Hospital Management System</h1>
  <button id="testBtn">Test Database Connection</button>
  <pre id="output">Click the button to fetch departments…</pre>

  <script>
    document.getElementById('testBtn').addEventListener('click', async () => {
      const output = document.getElementById('output');
      output.textContent = 'Fetching…';
      try {
        const res  = await fetch('/api/departments');
        const data = await res.json();
        console.log('Departments:', data);
        output.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        output.textContent = 'Error: ' + err.message;
        console.error(err);
      }
    });
  </script>
</body>
</html>
