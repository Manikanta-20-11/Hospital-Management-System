<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HMS — Doctor Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:    #1d6fa4;
      --primary-lt: #e0f2fe;
      --accent:     #38bdf8;
      --bg:         #f0f7ff;
      --sidebar-bg: #0f172a;
      --card:       #ffffff;
      --text:       #1e293b;
      --muted:      #64748b;
      --border:     #e2e8f0;
      --success:    #22c55e;
      --warning:    #f59e0b;
      --danger:     #ef4444;
      --radius:     12px;
      --shadow:     0 4px 20px rgba(0,0,0,.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ── */
    nav {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 12px;
      color: #fff; font-size: 18px; font-weight: 700;
      text-decoration: none;
    }
    .nav-brand span { font-size: 24px; }
    .nav-right {
      display: flex; align-items: center; gap: 20px;
    }
    #nav-user-info {
      color: #94a3b8; font-size: 14px;
    }
    #nav-user-info strong { color: #e2e8f0; }
    .btn-logout {
      padding: 8px 18px;
      background: rgba(239,68,68,.15);
      border: 1px solid rgba(239,68,68,.4);
      color: #fca5a5;
      border-radius: 8px;
      font-size: 13px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-logout:hover {
      background: rgba(239,68,68,.3);
      color: #fff;
    }

    /* ── Main Layout ── */
    main {
      flex: 1;
      padding: 36px 40px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .page-header {
      margin-bottom: 28px;
    }
    .page-header h1 {
      font-size: 28px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 10px;
    }
    .page-header p { color: var(--muted); font-size: 14px; margin-top: 6px; }

    /* ── Stats Cards ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
      transition: transform .2s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .stat-icon.blue  { background: #dbeafe; }
    .stat-icon.green { background: #dcfce7; }
    .stat-icon.amber { background: #fef9c3; }
    .stat-info span  { font-size: 26px; font-weight: 700; color: var(--text); }
    .stat-info p     { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── Table Card ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .card-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-header h2 { font-size: 17px; font-weight: 700; color: var(--text); }
    .card-header small { color: var(--muted); font-size: 13px; }

    table {
      width: 100%; border-collapse: collapse;
    }
    thead th {
      background: #f8fafc;
      padding: 12px 20px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .6px;
      border-bottom: 1px solid var(--border);
    }
    tbody tr {
      transition: background .15s;
    }
    tbody tr:hover { background: #f8fafc; }
    tbody td {
      padding: 14px 20px;
      font-size: 14px;
      color: var(--text);
      border-bottom: 1px solid #f1f5f9;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-green  { background: #dcfce7; color: #166534; }
    .badge-blue   { background: #dbeafe; color: #1e40af; }
    .badge-amber  { background: #fef3c7; color: #92400e; }
    .badge-red    { background: #fee2e2; color: #991b1b; }

    .empty-state {
      padding: 60px 24px;
      text-align: center;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    #loading-spinner {
      padding: 60px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── Consult Button ── */
    .btn-consult {
      padding: 6px 14px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff;
      border: none; border-radius: 6px;
      font-size: 12px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 2px 8px rgba(124,58,237,.35);
    }
    .btn-consult:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(124,58,237,.45);
    }
    .btn-consult:disabled {
      opacity: .5; cursor: default; transform: none;
    }

    /* ── Modal Overlay ── */
    #consult-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(15,23,42,.55);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }
    #consult-overlay.open { display: flex; }

    #consult-modal {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 24px 64px rgba(0,0,0,.25);
      width: 100%;
      max-width: 560px;
      padding: 36px 40px;
      position: relative;
      animation: modalIn .25s ease both;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(-20px) scale(.97); }
      to   { opacity: 1; transform: translateY(0)  scale(1);     }
    }

    #modal-close {
      position: absolute; top: 16px; right: 20px;
      background: none; border: none;
      font-size: 22px; color: var(--muted);
      cursor: pointer; line-height: 1;
      transition: color .15s;
    }
    #modal-close:hover { color: var(--danger); }

    .modal-header { margin-bottom: 28px; }
    .modal-header h3 {
      font-size: 20px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 8px;
    }
    .modal-patient-chip {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 8px;
      background: #f0f7ff;
      border: 1px solid #bfdbfe;
      color: var(--primary);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 13px; font-weight: 600;
    }

    .modal-group { margin-bottom: 20px; }
    .modal-group label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--text); margin-bottom: 8px;
    }
    .modal-group textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: #f8fafc;
      resize: vertical;
      min-height: 100px;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .modal-group textarea:focus {
      border-color: #7c3aed;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(124,58,237,.12);
    }

    .btn-save {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(124,58,237,.35);
      transition: transform .15s, box-shadow .15s;
    }
    .btn-save:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(124,58,237,.45);
    }
    .btn-save:disabled { opacity: .6; cursor: default; transform: none; }

    #modal-error {
      display: none;
      background: #fef2f2; border: 1px solid #fecaca;
      color: #991b1b; border-radius: 8px;
      padding: 9px 13px; font-size: 13px;
      margin-top: 12px; text-align: center;
    }

    /* Responsive */
    @media (max-width: 768px) {
      main { padding: 20px 16px; }
      nav  { padding: 0 16px; }
      #consult-modal { margin: 16px; padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <a class="nav-brand" href="/dashboard">
      <span>🏥</span> MediCore HMS
    </a>
    <div class="nav-right">
      <div id="nav-user-info">Logged in as <strong id="nav-username">—</strong></div>
      <button class="btn-logout" id="logout-btn">Logout</button>
    </div>
  </nav>

  <!-- Main -->
  <main>
    <div class="page-header">
      <h1>📅 My Upcoming Appointments</h1>
      <p id="doctor-subtitle">Loading your schedule…</p>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon blue">📋</div>
        <div class="stat-info">
          <span id="stat-total">—</span>
          <p>Total Appointments</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">✅</div>
        <div class="stat-info">
          <span id="stat-scheduled">—</span>
          <p>Scheduled</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon amber">⏳</div>
        <div class="stat-info">
          <span id="stat-completed">—</span>
          <p>Completed</p>
        </div>
      </div>
    </div>

    <!-- Appointments Table -->
    <div class="card">
      <div class="card-header">
        <h2>Appointment Queue</h2>
        <small id="last-refresh">—</small>
      </div>
      <div id="table-container">
        <div id="loading-spinner">⏳ Loading appointments…</div>
      </div>
    </div>
  </main>

  <!-- ── Consult Modal ── -->
  <div id="consult-overlay">
    <div id="consult-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button id="modal-close" aria-label="Close modal">✕</button>

      <div class="modal-header">
        <h3 id="modal-title">📝 Consultation Notes</h3>
        <div class="modal-patient-chip">
          <span>👤</span>
          <span id="modal-patient-name">—</span>
        </div>
      </div>

      <form id="consult-form" novalidate>
        <div class="modal-group">
          <label for="diagnosis-input">Diagnosis</label>
          <textarea id="diagnosis-input" placeholder="Describe the diagnosis…" required></textarea>
        </div>
        <div class="modal-group">
          <label for="prescription-input">Prescription &amp; Notes</label>
          <textarea id="prescription-input" placeholder="List medications, dosage, and any additional notes…" required></textarea>
        </div>
        <button type="submit" class="btn-save" id="save-btn">💾 Save Medical Record</button>
        <div id="modal-error"></div>
      </form>
    </div>
  </div>
    </div>

  <script>
    // ── Security Check ──
    const raw = localStorage.getItem('user');
    if (!raw) { window.location.href = '/'; }

    const user = JSON.parse(raw);
    if (!user.DoctorID) {
      // Not a doctor — maybe a receptionist
      window.location.href = '/staff-dashboard';
    }

    // ── Populate nav info ──
    document.getElementById('nav-username').textContent = user.Username || 'Doctor';
    document.getElementById('doctor-subtitle').textContent =
      `Doctor ID: ${user.DoctorID} — ${new Date().toLocaleDateString('en-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' })}`;

    // ── Logout ──
    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.clear();
      window.location.href = '/';
    });

    // ── Status badge helper ──
    function statusBadge(status) {
      const map = {
        'Scheduled': 'badge-blue',
        'Completed':  'badge-green',
        'Cancelled':  'badge-red',
        'In Progress':'badge-amber'
      };
      const cls = map[status] || 'badge-blue';
      return `<span class="badge ${cls}">${status}</span>`;
    }

    // ── Fetch & Render Appointments ──
    async function loadAppointments() {
      const container = document.getElementById('table-container');
      try {
        const res  = await fetch(`/api/doctor/${user.DoctorID}/appointments`);
        const data = await res.json();

        document.getElementById('last-refresh').textContent =
          'Last updated: ' + new Date().toLocaleTimeString();

        if (!Array.isArray(data) || data.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="icon">🗓️</div>
              <p>No upcoming appointments found.</p>
            </div>`;
          document.getElementById('stat-total').textContent     = 0;
          document.getElementById('stat-scheduled').textContent = 0;
          document.getElementById('stat-completed').textContent = 0;
          return;
        }

        // Stats
        document.getElementById('stat-total').textContent =
          data.length;
        document.getElementById('stat-scheduled').textContent =
          data.filter(a => a.Status === 'Scheduled').length;
        document.getElementById('stat-completed').textContent =
          data.filter(a => a.Status === 'Completed').length;

        // Build table
        const rows = data.map(a => {
          const isCompleted = a.Status === 'Completed' || a.Status === 'Cancelled';
          const actionBtn = isCompleted
            ? `<span style="font-size:12px;color:var(--muted);">—</span>`
            : `<button
                class="btn-consult"
                onclick="openConsultModal(${a.AppointmentID}, '${a.PatientFirstName} ${a.PatientLastName}', ${JSON.stringify(a.PatientID ?? 'null')})"
              >🩺 Consult</button>`;
          return `
            <tr id="appt-row-${a.AppointmentID}">
              <td>${a.AppointmentID}</td>
              <td>${a.ApptDate}</td>
              <td>${a.ApptTime}</td>
              <td>${a.PatientFirstName} ${a.PatientLastName}</td>
              <td id="status-${a.AppointmentID}">${statusBadge(a.Status)}</td>
              <td>${actionBtn}</td>
            </tr>`;
        }).join('');

        container.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Time</th>
                <th>Patient Name</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;
      } catch (err) {
        container.innerHTML = `<div class="empty-state"><p>⚠️ Failed to load appointments: ${err.message}</p></div>`;
        console.error(err);
      }
    }

    loadAppointments();

    // ── Modal State ──
    let activeAppointmentID = null;
    let activePatientID     = null;

    function openConsultModal(appointmentId, patientName, patientId) {
      activeAppointmentID = appointmentId;
      activePatientID     = patientId;
      document.getElementById('modal-patient-name').textContent = patientName;
      document.getElementById('diagnosis-input').value    = '';
      document.getElementById('prescription-input').value = '';
      document.getElementById('modal-error').style.display = 'none';
      document.getElementById('consult-overlay').classList.add('open');
      document.getElementById('diagnosis-input').focus();
    }

    function closeConsultModal() {
      document.getElementById('consult-overlay').classList.remove('open');
      activeAppointmentID = null;
      activePatientID     = null;
    }

    // Close on overlay click or ✕ button
    document.getElementById('modal-close').addEventListener('click', closeConsultModal);
    document.getElementById('consult-overlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('consult-overlay')) closeConsultModal();
    });
    // Close on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeConsultModal();
    });

    // ── Save Medical Record ──
    document.getElementById('consult-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const diagnosis    = document.getElementById('diagnosis-input').value.trim();
      const prescription = document.getElementById('prescription-input').value.trim();
      const errorDiv     = document.getElementById('modal-error');
      const saveBtn      = document.getElementById('save-btn');

      errorDiv.style.display = 'none';

      if (!diagnosis || !prescription) {
        errorDiv.textContent   = '⚠️ Please fill in both Diagnosis and Prescription fields.';
        errorDiv.style.display = 'block';
        return;
      }

      saveBtn.disabled    = true;
      saveBtn.textContent = 'Saving…';

      try {
        const res  = await fetch('/api/medical-records', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            PatientID:    activePatientID,
            DoctorID:     user.DoctorID,
            Diagnosis:    diagnosis,
            Prescription: prescription
          })
        });
        const data = await res.json();

        if (res.ok) {
          alert(`✅ Medical Record Saved! (Record ID: ${data.RecordID}, Date: ${data.DateRecorded})`);

          // Update the row's status badge in the UI to 'Completed'
          const statusCell = document.getElementById(`status-${activeAppointmentID}`);
          if (statusCell) statusCell.innerHTML = statusBadge('Completed');

          // Disable the Consult button for this row
          const row = document.getElementById(`appt-row-${activeAppointmentID}`);
          if (row) {
            const actionCell = row.querySelector('td:last-child');
            if (actionCell) actionCell.innerHTML = `<span style="font-size:12px;color:var(--muted);">Done ✓</span>`;
          }

          // Update completed stat counter
          const compEl = document.getElementById('stat-completed');
          compEl.textContent = parseInt(compEl.textContent || '0') + 1;

          closeConsultModal();
        } else {
          errorDiv.textContent   = '⚠️ ' + (data.error || 'Failed to save record.');
          errorDiv.style.display = 'block';
        }
      } catch (err) {
        errorDiv.textContent   = '⚠️ Network error: ' + err.message;
        errorDiv.style.display = 'block';
        console.error(err);
      } finally {
        saveBtn.disabled    = false;
        saveBtn.textContent = '💾 Save Medical Record';
      }
    });
  </script>
</body>
</html>
