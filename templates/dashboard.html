<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HMS — Doctor Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:    #1d6fa4;
      --primary-lt: #e0f2fe;
      --accent:     #38bdf8;
      --bg:         #f0f7ff;
      --sidebar-bg: #0f172a;
      --card:       #ffffff;
      --text:       #1e293b;
      --muted:      #64748b;
      --border:     #e2e8f0;
      --success:    #22c55e;
      --warning:    #f59e0b;
      --danger:     #ef4444;
      --radius:     12px;
      --shadow:     0 4px 20px rgba(0,0,0,.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ── */
    nav {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 12px;
      color: #fff; font-size: 18px; font-weight: 700;
      text-decoration: none;
    }
    .nav-brand span { font-size: 24px; }
    .nav-right {
      display: flex; align-items: center; gap: 20px;
    }
    #nav-user-info {
      color: #94a3b8; font-size: 14px;
    }
    #nav-user-info strong { color: #e2e8f0; }
    .btn-logout {
      padding: 8px 18px;
      background: rgba(239,68,68,.15);
      border: 1px solid rgba(239,68,68,.4);
      color: #fca5a5;
      border-radius: 8px;
      font-size: 13px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-logout:hover {
      background: rgba(239,68,68,.3);
      color: #fff;
    }

    /* ── Main Layout ── */
    main {
      flex: 1;
      padding: 36px 40px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .page-header {
      margin-bottom: 28px;
    }
    .page-header h1 {
      font-size: 28px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 10px;
    }
    .page-header p { color: var(--muted); font-size: 14px; margin-top: 6px; }

    /* ── Stats Cards ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
      transition: transform .2s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .stat-icon.blue  { background: #dbeafe; }
    .stat-icon.green { background: #dcfce7; }
    .stat-icon.amber { background: #fef9c3; }
    .stat-info span  { font-size: 26px; font-weight: 700; color: var(--text); }
    .stat-info p     { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── Table Card ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .card-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-header h2 { font-size: 17px; font-weight: 700; color: var(--text); }
    .card-header small { color: var(--muted); font-size: 13px; }

    table {
      width: 100%; border-collapse: collapse;
    }
    thead th {
      background: #f8fafc;
      padding: 12px 20px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .6px;
      border-bottom: 1px solid var(--border);
    }
    tbody tr {
      transition: background .15s;
    }
    tbody tr:hover { background: #f8fafc; }
    tbody td {
      padding: 14px 20px;
      font-size: 14px;
      color: var(--text);
      border-bottom: 1px solid #f1f5f9;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-green  { background: #dcfce7; color: #166534; }
    .badge-blue   { background: #dbeafe; color: #1e40af; }
    .badge-amber  { background: #fef3c7; color: #92400e; }
    .badge-red    { background: #fee2e2; color: #991b1b; }

    .empty-state {
      padding: 60px 24px;
      text-align: center;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    #loading-spinner {
      padding: 60px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      main { padding: 20px 16px; }
      nav  { padding: 0 16px; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <a class="nav-brand" href="/dashboard">
      <span>🏥</span> MediCore HMS
    </a>
    <div class="nav-right">
      <div id="nav-user-info">Logged in as <strong id="nav-username">—</strong></div>
      <button class="btn-logout" id="logout-btn">Logout</button>
    </div>
  </nav>

  <!-- Main -->
  <main>
    <div class="page-header">
      <h1>📅 My Upcoming Appointments</h1>
      <p id="doctor-subtitle">Loading your schedule…</p>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon blue">📋</div>
        <div class="stat-info">
          <span id="stat-total">—</span>
          <p>Total Appointments</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">✅</div>
        <div class="stat-info">
          <span id="stat-scheduled">—</span>
          <p>Scheduled</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon amber">⏳</div>
        <div class="stat-info">
          <span id="stat-completed">—</span>
          <p>Completed</p>
        </div>
      </div>
    </div>

    <!-- Appointments Table -->
    <div class="card">
      <div class="card-header">
        <h2>Appointment Queue</h2>
        <small id="last-refresh">—</small>
      </div>
      <div id="table-container">
        <div id="loading-spinner">⏳ Loading appointments…</div>
      </div>
    </div>
  </main>

  <script>
    // ── Security Check ──
    const raw = localStorage.getItem('user');
    if (!raw) { window.location.href = '/'; }

    const user = JSON.parse(raw);
    if (!user.DoctorID) {
      // Not a doctor — maybe a receptionist
      window.location.href = '/staff-dashboard';
    }

    // ── Populate nav info ──
    document.getElementById('nav-username').textContent = user.Username || 'Doctor';
    document.getElementById('doctor-subtitle').textContent =
      `Doctor ID: ${user.DoctorID} — ${new Date().toLocaleDateString('en-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' })}`;

    // ── Logout ──
    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.clear();
      window.location.href = '/';
    });

    // ── Status badge helper ──
    function statusBadge(status) {
      const map = {
        'Scheduled': 'badge-blue',
        'Completed':  'badge-green',
        'Cancelled':  'badge-red',
        'In Progress':'badge-amber'
      };
      const cls = map[status] || 'badge-blue';
      return `<span class="badge ${cls}">${status}</span>`;
    }

    // ── Fetch & Render Appointments ──
    async function loadAppointments() {
      const container = document.getElementById('table-container');
      try {
        const res  = await fetch(`/api/doctor/${user.DoctorID}/appointments`);
        const data = await res.json();

        document.getElementById('last-refresh').textContent =
          'Last updated: ' + new Date().toLocaleTimeString();

        if (!Array.isArray(data) || data.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="icon">🗓️</div>
              <p>No upcoming appointments found.</p>
            </div>`;
          document.getElementById('stat-total').textContent     = 0;
          document.getElementById('stat-scheduled').textContent = 0;
          document.getElementById('stat-completed').textContent = 0;
          return;
        }

        // Stats
        document.getElementById('stat-total').textContent =
          data.length;
        document.getElementById('stat-scheduled').textContent =
          data.filter(a => a.Status === 'Scheduled').length;
        document.getElementById('stat-completed').textContent =
          data.filter(a => a.Status === 'Completed').length;

        // Build table
        const rows = data.map(a => `
          <tr>
            <td>${a.AppointmentID}</td>
            <td>${a.ApptDate}</td>
            <td>${a.ApptTime}</td>
            <td>${a.PatientFirstName} ${a.PatientLastName}</td>
            <td>${statusBadge(a.Status)}</td>
          </tr>
        `).join('');

        container.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Time</th>
                <th>Patient Name</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;
      } catch (err) {
        container.innerHTML = `<div class="empty-state"><p>⚠️ Failed to load appointments: ${err.message}</p></div>`;
        console.error(err);
      }
    }

    loadAppointments();
  </script>
</body>
</html>
